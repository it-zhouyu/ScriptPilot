<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScriptPilot - AI 口播稿生成器</title>
    <link rel="icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Plus Jakarta Sans', 'PingFang SC', 'system-ui', '-apple-system', 'sans-serif'],
              display: ['Bricolage Grotesque', 'Plus Jakarta Sans', 'PingFang SC', 'system-ui', 'sans-serif'],
            },
            colors: {
              bg: {
                deep: '#EDE8E1',
                base: '#F9F6F2',
                elevated: '#FFFFFF',
              },
              surface: {
                DEFAULT: 'rgba(44, 32, 20, 0.03)',
                hover: 'rgba(44, 32, 20, 0.05)',
                active: 'rgba(44, 32, 20, 0.07)',
              },
              border: {
                subtle: 'rgba(44, 32, 20, 0.07)',
                DEFAULT: 'rgba(44, 32, 20, 0.12)',
              },
              accent: {
                DEFAULT: '#C75832',
                light: '#E89270',
                dim: '#A3421F',
              },
              fg: {
                DEFAULT: '#2A2017',
                secondary: '#736860',
                dim: '#AEA59C',
              },
            },
          },
        },
      }
    </script>
    <style>
      ::selection {
        background: rgba(199, 88, 50, 0.15);
        color: #2A2017;
      }
    </style>
  </head>
  <body class="bg-bg-base text-fg font-sans min-h-screen antialiased">
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
